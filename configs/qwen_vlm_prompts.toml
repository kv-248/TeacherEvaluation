version = "0.1.0"
purpose = "Skeleton for targeted VLM prompts used during semantic review and validation."

[frame_semantic_review]
model = "Qwen/Qwen2.5-VL-7B-Instruct"
temperature = 0.1
max_new_tokens = 180
status = "skeleton_only"

prompt = """
Review a lecture-video frame and return structured JSON only.
Focus on teacher attention target, body action, affect tone, posture signal, and confidence.
"""

